# 个人站点生产部署编排
# 用法：在项目根目录执行 docker compose -f docker/docker-compose.yml up -d --build

services:
  # Nginx：统一入口 + 子应用静态资源
  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-net

  # Next.js 主基座
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
    environment:
      NODE_ENV: production
      # 轻量服务器限制 Node 堆内存，避免 OOM 导致 502
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=384}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/projects',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - app-net

  # NestJS 后端 API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/prod.db"
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-personal-site-prod-secret}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - api-data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3001/api/article/list',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - app-net

volumes:
  api-data:

networks:
  app-net:
    driver: bridge

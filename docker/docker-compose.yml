# 个人站点生产部署编排
# 用法：在项目根目录执行 docker compose -f docker/docker-compose.yml up -d --build

services:
  # Nginx：统一入口 + 子应用静态资源
  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-net

  # Next.js 主基座
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - app-net

  # NestJS 后端 API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/prod.db"
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    networks:
      - app-net

volumes:
  api-data:

networks:
  app-net:
    driver: bridge

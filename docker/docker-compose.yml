# 个人站点生产部署编排
# 用法：在项目根目录执行 docker compose -f docker/docker-compose.yml up -d --build
#
# 数据库持久化：api 服务挂载命名卷 docker_api-data（SQLite prod.db），
# docker compose down 不带 -v 时卷不会被删除，重复部署保留已有数据。

name: docker

services:
  # Nginx：统一入口 + 子应用静态资源
  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-net

  # Next.js 主基座
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
    environment:
      NODE_ENV: production
      # 轻量服务器限制 Node 堆内存，避免 OOM 导致 502
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=384}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/projects',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - app-net

  # NestJS 后端 API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/prod.db"
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-personal-site-prod-secret}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      # AI 小助手（OpenAI 兼容 API，部署时在 .env 中配置）
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      LANCE_DB_PATH: /app/data/lancedb
      AI_CHUNK_SIZE: ${AI_CHUNK_SIZE:-800}
      AI_CHUNK_OVERLAP: ${AI_CHUNK_OVERLAP:-100}
      # 轻量服务器限制 API 堆内存，与 web 容器合计不超过 2GB
      # NODE_OPTIONS: ${API_NODE_OPTIONS:---max-old-space-size=512}
    volumes:
      - api-data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3001/api/article/list',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - app-net

volumes:
  # 固定卷名，避免 compose 项目目录变化导致挂载到新空卷、丢失旧库
  api-data:
    name: docker_api-data

networks:
  app-net:
    driver: bridge

# Nginx 反向代理：统一入口 80 端口
# - /           → Next.js 主基座
# - /api/       → NestJS 后端
# - /micro/*    → Qiankun 子应用静态资源

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 上游服务
    upstream next_host {
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream nest_api {
        server api:3001 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # NestJS API
        location /api/ {
            proxy_pass http://nest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Qiankun 子应用静态资源
        location = /micro/web   { return 301 /micro/web/; }
        location = /micro/admin { return 301 /micro/admin/; }

        location /micro/web/ {
            alias /usr/share/nginx/micro/web/;
            try_files $uri $uri/ index.html;
        }
        location /micro/admin/ {
            alias /usr/share/nginx/micro/admin/;
            try_files $uri $uri/ index.html;
        }

        # 同城便民 uni-app H5（C 端）
        location = /convenience { return 301 /convenience/; }
        location /convenience/ {
            alias /usr/share/nginx/convenience/;
            try_files $uri $uri/ index.html;
        }

        # Next.js 主基座（含 HMR 以外的所有页面路由）
        location / {
            proxy_pass http://next_host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}

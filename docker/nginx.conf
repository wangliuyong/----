# Nginx 反向代理：统一入口 80 端口
# - /           → Next.js 主基座
# - /api/       → NestJS 后端
# - /micro/*    → Qiankun 子应用静态资源

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 上游服务
    upstream next_host {
        server web:3000;
    }

    upstream nest_api {
        server api:3001;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # NestJS API
        location /api/ {
            proxy_pass http://nest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Qiankun 子应用静态资源（各子目录独立 SPA）
        # 无尾部斜杠时重定向，避免落入 Next.js 返回 404 + __next_f 脚本
        location = /micro/home    { return 301 /micro/home/; }
        location = /micro/about   { return 301 /micro/about/; }
        location = /micro/blog    { return 301 /micro/blog/; }
        location = /micro/projects { return 301 /micro/projects/; }
        location = /micro/contact { return 301 /micro/contact/; }
        location = /micro/links   { return 301 /micro/links/; }

        # alias + try_files：fallback 使用相对 alias 目录的 index.html
        location /micro/home/ {
            alias /usr/share/nginx/micro/home/;
            try_files $uri $uri/ index.html;
        }
        location /micro/about/ {
            alias /usr/share/nginx/micro/about/;
            try_files $uri $uri/ index.html;
        }
        location /micro/blog/ {
            alias /usr/share/nginx/micro/blog/;
            try_files $uri $uri/ index.html;
        }
        location /micro/projects/ {
            alias /usr/share/nginx/micro/projects/;
            try_files $uri $uri/ index.html;
        }
        location /micro/contact/ {
            alias /usr/share/nginx/micro/contact/;
            try_files $uri $uri/ index.html;
        }
        location /micro/links/ {
            alias /usr/share/nginx/micro/links/;
            try_files $uri $uri/ index.html;
        }

        # Next.js 主基座（含 HMR 以外的所有页面路由）
        location / {
            proxy_pass http://next_host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
